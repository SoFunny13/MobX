<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор отчетов ФМС</title>
    <script>if(!sessionStorage.getItem('mobx_hub_access'))window.location.replace('../');</script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-link active">Отчет</a>
        <a href="offers.html" class="nav-link">Оферы</a>
        <a href="sources.html" class="nav-link">Источники</a>
    </nav>

    <div class="container">
        <h1>Генератор отчетов ФМС</h1>

        <!-- Upload section -->
        <div class="card">
            <h2>Загрузка статистики</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="report-date">Дата отчета</label>
                    <input type="date" id="report-date" required>
                </div>
                <div class="form-group">
                    <label for="exchange-rate">Курс USD (руб.)</label>
                    <input type="number" id="exchange-rate" step="0.01" min="0.01" placeholder="90.50" required>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="stats-file">Файл статистики (.xlsx)</label>
                <input type="file" id="stats-file" accept=".xlsx" required>
            </div>
            <button class="btn btn-primary" id="btn-upload" onclick="uploadFile()">
                Загрузить и проверить
            </button>
            <div id="upload-status"></div>
        </div>

        <!-- Resolution section (hidden by default) -->
        <div class="card hidden" id="resolution-card">
            <h2>Сопоставление ID</h2>
            <div id="match-info"></div>

            <div id="unmatched-offers-section" class="resolution-section hidden">
                <h3>Не найдены оферы</h3>
                <table class="resolution-table">
                    <thead>
                        <tr>
                            <th>Название в файле</th>
                            <th>ID офера</th>
                        </tr>
                    </thead>
                    <tbody id="unmatched-offers-body"></tbody>
                </table>
            </div>

            <div id="unmatched-sources-section" class="resolution-section hidden">
                <h3>Не найдены источники</h3>
                <table class="resolution-table">
                    <thead>
                        <tr>
                            <th>Название в файле</th>
                            <th>ID источника</th>
                        </tr>
                    </thead>
                    <tbody id="unmatched-sources-body"></tbody>
                </table>
            </div>

            <button class="btn btn-confirm hidden" id="btn-confirm" onclick="confirmIds()">
                Подтвердить ID
            </button>
        </div>

        <!-- Download section (hidden by default) -->
        <div class="card hidden" id="download-card">
            <h2>Отчет готов</h2>
            <p class="match-summary" id="report-summary"></p>
            <button class="btn btn-success" onclick="downloadReport()">
                Скачать отчет
            </button>
        </div>
    </div>

    <script>
        // State
        let state = {
            statsRows: [],
            offerIds: {},
            sourceIds: {},
            manualOfferIds: {},
            manualSourceIds: {},
            unmatchedOffers: [],
            unmatchedSources: [],
            date: '',
            exchangeRate: 0,
        };

        // Init reference data on page load
        initReferenceData().catch(err => console.error('Ошибка инициализации:', err));

        async function uploadFile() {
            const dateInput = document.getElementById('report-date');
            const rateInput = document.getElementById('exchange-rate');
            const fileInput = document.getElementById('stats-file');
            const btn = document.getElementById('btn-upload');

            // Validate
            if (!dateInput.value) {
                showStatus('upload-status', 'Укажите дату отчета', 'error');
                return;
            }
            if (!rateInput.value || parseFloat(rateInput.value) <= 0) {
                showStatus('upload-status', 'Укажите корректный курс доллара', 'error');
                return;
            }
            if (!fileInput.files[0]) {
                showStatus('upload-status', 'Выберите файл статистики', 'error');
                return;
            }

            // Update UI
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Обработка...';
            clearStatus('upload-status');

            // Hide previous results
            document.getElementById('resolution-card').classList.add('hidden');
            document.getElementById('download-card').classList.add('hidden');

            try {
                // Read file
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();

                // Parse stats
                const result = parseStatsFile(arrayBuffer);
                if (result.error) {
                    showStatus('upload-status', result.error, 'error');
                    return;
                }

                // Build reference dicts
                const offers = getOffers() || [];
                const sources = getSources() || [];
                const offersDict = buildOffersDict(offers);
                const sourcesDict = buildSourcesDict(sources);

                // Match
                const uniqueOffers = [...new Set(result.statsRows.map(r => r.offer_name))].sort();
                const uniqueSources = [...new Set(result.statsRows.map(r => r.source_name))].sort();

                const matchedOffers = {};
                const unmatchedOffers = [];
                for (const name of uniqueOffers) {
                    const id = matchOffer(name, offersDict);
                    if (id !== null) {
                        matchedOffers[name] = id;
                    } else {
                        unmatchedOffers.push(name);
                    }
                }

                const matchedSources = {};
                const unmatchedSources = [];
                for (const name of uniqueSources) {
                    const id = matchSource(name, sourcesDict);
                    if (id !== null) {
                        matchedSources[name] = id;
                    } else {
                        unmatchedSources.push(name);
                    }
                }

                // Save state
                state.statsRows = result.statsRows;
                state.offerIds = matchedOffers;
                state.sourceIds = matchedSources;
                state.unmatchedOffers = unmatchedOffers;
                state.unmatchedSources = unmatchedSources;
                state.date = dateInput.value;
                state.exchangeRate = parseFloat(rateInput.value);

                const totalOffers = Object.keys(matchedOffers).length + unmatchedOffers.length;
                const totalSources = Object.keys(matchedSources).length + unmatchedSources.length;

                // Show resolution card
                const resCard = document.getElementById('resolution-card');
                resCard.classList.remove('hidden');

                document.getElementById('match-info').innerHTML = `
                    <p class="match-summary">Оферы: найдено ${Object.keys(matchedOffers).length} из ${totalOffers}</p>
                    <p class="match-summary">Источники: найдено ${Object.keys(matchedSources).length} из ${totalSources}</p>
                    <p class="match-summary">Строк данных: ${result.statsRows.length}</p>
                `;

                const hasUnmatched = unmatchedOffers.length > 0 || unmatchedSources.length > 0;

                // Render unmatched offers
                if (unmatchedOffers.length > 0) {
                    document.getElementById('unmatched-offers-section').classList.remove('hidden');
                    document.getElementById('unmatched-offers-body').innerHTML = unmatchedOffers.map(name => `
                        <tr>
                            <td>${escapeHtml(name)}</td>
                            <td><input type="number" class="offer-id-input" data-name="${escapeAttr(name)}" placeholder="ID"></td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('unmatched-offers-section').classList.add('hidden');
                }

                // Render unmatched sources
                if (unmatchedSources.length > 0) {
                    document.getElementById('unmatched-sources-section').classList.remove('hidden');
                    document.getElementById('unmatched-sources-body').innerHTML = unmatchedSources.map(name => `
                        <tr>
                            <td>${escapeHtml(name)}</td>
                            <td><input type="number" class="source-id-input" data-name="${escapeAttr(name)}" placeholder="ID"></td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('unmatched-sources-section').classList.add('hidden');
                }

                if (hasUnmatched) {
                    document.getElementById('btn-confirm').classList.remove('hidden');
                    document.getElementById('download-card').classList.add('hidden');
                    showStatus('upload-status', 'Заполните недостающие ID и нажмите "Подтвердить"', 'info');
                } else {
                    document.getElementById('btn-confirm').classList.add('hidden');
                    showDownload();
                    showStatus('upload-status', 'Все ID найдены автоматически', 'success');
                }

            } catch (err) {
                showStatus('upload-status', 'Ошибка: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Загрузить и проверить';
            }
        }

        function confirmIds() {
            state.manualOfferIds = {};
            state.manualSourceIds = {};

            // Read manual offer IDs
            const offerInputs = document.querySelectorAll('.offer-id-input');
            for (const input of offerInputs) {
                const val = input.value.trim();
                if (!val) {
                    showStatus('upload-status', `Укажите ID для офера: ${input.dataset.name}`, 'error');
                    input.focus();
                    return;
                }
                const id = parseInt(val);
                state.offerIds[input.dataset.name] = id;
                state.manualOfferIds[input.dataset.name] = id;
            }

            // Read manual source IDs
            const sourceInputs = document.querySelectorAll('.source-id-input');
            for (const input of sourceInputs) {
                const val = input.value.trim();
                if (!val) {
                    showStatus('upload-status', `Укажите ID для источника: ${input.dataset.name}`, 'error');
                    input.focus();
                    return;
                }
                const id = parseInt(val);
                state.sourceIds[input.dataset.name] = id;
                state.manualSourceIds[input.dataset.name] = id;
            }

            // Save learned mappings
            if (Object.keys(state.manualOfferIds).length > 0) {
                saveOfferMappings(state.manualOfferIds);
                // Also add to reference data (without platform suffix)
                for (const [name, id] of Object.entries(state.manualOfferIds)) {
                    addOffer(id, stripPlatformSuffix(name));
                }
            }
            if (Object.keys(state.manualSourceIds).length > 0) {
                saveSourceMappings(state.manualSourceIds);
                for (const [name, id] of Object.entries(state.manualSourceIds)) {
                    addSource(id, name);
                }
            }

            showDownload();
            showStatus('upload-status', 'Все ID заполнены и сохранены', 'success');
        }

        function showDownload() {
            const card = document.getElementById('download-card');
            card.classList.remove('hidden');
            document.getElementById('report-summary').textContent =
                `${state.statsRows.length} строк, дата: ${state.date}, курс: ${state.exchangeRate} руб./USD`;
        }

        function downloadReport() {
            generateReport(state.date, state.exchangeRate, state.statsRows, state.offerIds, state.sourceIds);
        }
    </script>
</body>
</html>
